  /auth/login:
    post:
      summary: "Authenticate and receive JWT token"
      operationId: postauthLogin
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Successful operation
        '400':
