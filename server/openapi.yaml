openapi: 3.1.0
info:
  title: Trier OS API
  version: 3.5.1
  description: |
    Enterprise Industrial Operating System REST API.
    Single-instance deployment — all plants connect to one corporate server.
    Plant scope is set per-request via the x-plant-id header.
  contact:
    name: Trier OS Engineering
  license:
    name: Proprietary — © 2026 Trier OS. All Rights Reserved.
servers:
  - url: /api
    description: Trier OS corporate server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: query
      name: api_key
  parameters:
    PlantIdHeader:
      name: x-plant-id
      in: header
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9_-]{1,64}$'
      description: Plant database identifier. Use 'all_sites' for corporate-scoped endpoints.
security:
  - BearerAuth: []
  - ApiKeyAuth: []
tags:
  - name: Authentication
  - name: Work Orders
  - name: Assets
  - name: Inventory
  - name: PM Schedules
  - name: Notifications
  - name: BI Export
  - name: Webhooks
  - name: Approvals
  - name: Logistics
  - name: Branding
  - name: Search
  - name: Safety & Compliance
  - name: Risk Scoring
  - name: Energy & Utilities
  - name: Vendor Analytics
  - name: Spare Parts Optimization
  - name: Asset Lifecycle
  - name: Edge Mesh
  - name: Operator Trust
  - name: Gatekeeper
  - name: Storeroom
  - name: Digital Twin
